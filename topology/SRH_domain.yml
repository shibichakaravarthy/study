name: Basics_Routing

topology:
  nodes:

    # =========================
    # Routers
    # =========================
    r1:
      kind: linux
      image: frrouting/frr:latest

    r2:
      kind: linux
      image: frrouting/frr:latest

    r3:
      kind: linux
      image: frrouting/frr:latest

    r4:
      kind: linux
      image: frrouting/frr:latest

    # =========================
    # Clients
    # =========================
    client1:
      kind: linux
      image: ubuntu:latest

    client2:
      kind: linux
      image: ubuntu:latest

  links:

    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r2:eth2", "r4:eth1"]
    - endpoints: ["r4:eth2", "r3:eth1"]
    - endpoints: ["r3:eth2", "r1:eth2"]

    - endpoints: ["r1:eth3", "r4:eth3"]
    - endpoints: ["r2:eth3", "r3:eth3"]

    - endpoints: ["client1:eth1", "r1:eth4"]
    - endpoints: ["client2:eth1", "r4:eth4"]