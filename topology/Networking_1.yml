name: Basics_Routing

topology:
  defaults:
    sysctls:
      net.ipv6.conf.all.forwarding: 1

  nodes:

    # =========================
    # Routers
    # =========================
    r1:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ../configs/r1.config:/etc/frr/frr.conf
        - ../configs/daemons:/etc/frr/daemons

    r2:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ../configs/r2.config:/etc/frr/frr.conf
        - ../configs/daemons:/etc/frr/daemons

    r3:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ../configs/r3.config:/etc/frr/frr.conf
        - ../configs/daemons:/etc/frr/daemons

    r4:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ../configs/r4.config:/etc/frr/frr.conf
        - ../configs/daemons:/etc/frr/daemons

    # =========================
    # Clients
    # =========================
    shibi:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip -6 addr add fc00:1::10/64 dev eth1
        - ip link set eth1 up
        - ip -6 route add default via fc00:1::1

    # =========================
    # Server
    # =========================
    jani:
      kind: linux
      image: nicolaka/netshoot
      exec:
        - ip -6 addr add fc00:4::10/64 dev eth1
        - ip link set eth1 up
        - ip -6 route add default via fc00:4::1

  links:

    # =========================
    # Core Router Mesh
    # =========================
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r2:eth2", "r4:eth1"]
    - endpoints: ["r4:eth2", "r3:eth1"]
    - endpoints: ["r3:eth2", "r1:eth2"]

    - endpoints: ["r1:eth3", "r4:eth3"]
    - endpoints: ["r2:eth3", "r3:eth3"]

    # =========================
    # Access Networks
    # =========================

    # Hosts → R1
    - endpoints: ["shibi:eth1", "r1:eth4"]      

    # Server → R4
    - endpoints: ["jani:eth1", "r4:eth4"]